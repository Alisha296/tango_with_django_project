<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Page</title>
    <style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}
body {
    font-family: Arial, sans-serif;
    background-color: #f8f8f8;
}
.header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 20px;
    background-color: #fff;
    position: relative;
    box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
}
.logo {
    font-size: 20px;
    font-weight: bold;
    text-align: center;
    position: absolute;
    left: 50%;
    top: 0;
    transform: translateX(-50%);
}
.logo img{
    width: 95px;
}
.nav-icons {
    display: flex;
    gap: 20px;
}
.nav-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    font-size: 14px;
    color: #333;
    text-decoration: none;
}
.nav-item img {
    width: 20px;
    margin-bottom: 5px;
}
.container{
    width: 80%;
    margin: 20px auto;
    padding: 20px;
    border: 1px solid #ddd;
    border-radius: 5px;
    background: #fff;
}
.container p{
    margin: 10px 0;
}
.register{
    width: 80%;
    margin: 20px auto;
    padding: 20px;
    border: 1px solid #ddd;
    border-radius: 5px;
    background: #fff;
}
.register p{
    margin: 10px 0;
}
    </style>
</head>
<body>
    <div class="header">
        <div></div>
        <a href="../index.html">
            <div class="logo"><img src="../img/logo1.jpg" alt=""></div>
        </a>
        <div class="nav-icons">
            <a href="mine.html" class="nav-item">
                <i class="fas fa-user">
                    <img src="../img/img1.svg" alt="">
                </i>
                <span>My Account</span>
            </a>
            <a href="like.html" class="nav-item">
                <i class="fas fa-heart">
                    <img src="../img/img2.svg" alt="">
                </i>
                <span>Favorites</span>
            </a>
            <a href="shapping.html" class="nav-item">
                <i class="fas fa-shopping-cart">
                    <img src="../img/img3.svg" alt="">
                </i>
                <span>Shopping Cart</span>
            </a>
        </div>
    </div>
    <div class="container">
        <p>Not a member? Sign in</p>
        <p>electronic mail</p>
        <input type="text">
        <p>phone number</p>
        <input type="text">
        <p>password</p>
        <input type="password">
        <p>Verification Code</p>
        <input type="text"><br>
        <button>confirm</button>
    </div>
    <div class="register">
        <p>Email or Phone Number</p>
        <input type="text">
        <p>Password</p>
        <input type="password">
        <p>Verification Code</p>
        <input type="text"><br>
        <button>confirm</button>
    </div>
</body>
</html>
