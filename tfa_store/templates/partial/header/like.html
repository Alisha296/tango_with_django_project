<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的收藏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
        }
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 20px;
            background-color: #fff;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }
        .logo {
            font-size: 20px;
            font-weight: bold;
            text-align: center;
            position: absolute;
            left: 50%;
            top: 0;
            transform: translateX(-50%);
        }
        .logo img {
            width: 95px;
        }
        .nav-icons {
            display: flex;
            gap: 20px;
        }
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            font-size: 14px;
            color: #333;
            text-decoration: none;
        }
        .nav-item img {
            width: 20px;
            margin-bottom: 5px;
        }
        .container {
            max-width: 800px;
            margin: 20px auto;
            background: #fff;
            padding: 20px;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        h2 {
            text-align: center;
            margin-bottom: 20px;
        }
        .favorite-list {
            list-style: none;
        }
        .favorite-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px;
            border-bottom: 1px solid #ddd;
        }
        .favorite-item img {
            width: 60px;
            height: 60px;
            object-fit: cover;
            border-radius: 5px;
            margin-right: 10px;
        }
        .item-info {
            flex: 1;
        }
        .remove-btn {
            background: #ff4d4d;
            color: white;
            border: none;
            padding: 5px 10px;
            cursor: pointer;
            border-radius: 3px;
        }
        .remove-btn:hover {
            background: #cc0000;
        }
    </style>
</head>
<body>
    <div class="header">
        <div></div>
        <a href="../index.html">
            <div class="logo"><img src="../img/logo1.jpg" alt="Logo"></div>
        </a>
        <div class="nav-icons">
            <a href="mine.html" class="nav-item">
                <i class="fas fa-user">
                    <img src="../img/img1.svg" alt="">
                </i>
                <span>My Account</span>
            </a>
            <a href="like.html" class="nav-item">
                <i class="fas fa-heart">
                    <img src="../img/img2.svg" alt="">
                </i>
                <span>Favorites</span>
            </a>
            <a href="shapping.html" class="nav-item">
                <i class="fas fa-shopping-cart">
                    <img src="../img/img3.svg" alt="">
                </i>
                <span>Shopping Cart</span>
            </a>
        </div>
    </div>

    <div class="container">
        <h2>My like</h2>
        <ul class="favorite-list" id="favorite-list">
            <!-- 收藏商品将在这里动态渲染 -->
        </ul>
    </div>

    <script>
        function loadFavorites() {
            const favorites = JSON.parse(localStorage.getItem("favorites")) || [];
            const list = document.getElementById("favorite-list");

            list.innerHTML = ""; // 清空列表，避免重复渲染

            if (favorites.length === 0) {
                list.innerHTML = "<p style='text-align:center;'>no data</p>";
                return;
            }

            favorites.forEach((product, index) => {
                const listItem = document.createElement("li");
                listItem.classList.add("favorite-item");

                listItem.innerHTML = `
                    <img src="${product.img}" alt="${product.name}">
                    <div class="item-info">
                        <p>${product.name}</p>
                        <p>${product.price}</p>
                        <p>尺码：${product.size}</p>
                    </div>
                    <button class="remove-btn" onclick="removeFavorite(${index})">delect</button>
                `;

                list.appendChild(listItem);
            });
        }

        function removeFavorite(index) {
            let favorites = JSON.parse(localStorage.getItem("favorites")) || [];
            favorites.splice(index, 1); // 删除对应索引的商品
            localStorage.setItem("favorites", JSON.stringify(favorites));
            loadFavorites(); // 重新渲染页面
        }

        // 页面加载时渲染收藏列表
        window.onload = loadFavorites;
    </script>
</body>
</html>
